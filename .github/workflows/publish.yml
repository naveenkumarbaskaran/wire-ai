name: Publish to PyPI

on:
  push:
    branches: [stable]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"          # v1.3.0 — stable releases only
      # NOT matching: v1.3.0b1, v1.3.0rc1, v1.3.0-beta

jobs:
  publish:
    name: Build + Publish to PyPI
    runs-on: ubuntu-latest
    # Only publish from stable branch with a clean semver tag
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write    # OIDC trusted publishing (no token needed)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build deps
        run: pip install build twine

      - name: Install package + run tests
        run: |
          pip install -e ".[dev]"
          python -m pytest tests/ -q --tb=short

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v1.3.0
          PKG_VER=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "v${PKG_VER}" != "$TAG" ]; then
            echo "Tag $TAG does not match pyproject version $PKG_VER"
            exit 1
          fi
          echo "Tag matches version: $TAG"

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses OIDC — no API token needed if trusted publishing is configured
          # Fallback: set PYPI_API_TOKEN secret if OIDC not configured
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
