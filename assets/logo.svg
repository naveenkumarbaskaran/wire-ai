<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Deep background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0f1729"/>
      <stop offset="100%" style="stop-color:#070d1a"/>
    </radialGradient>
    <!-- Cyan gradient for W -->
    <linearGradient id="wGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <!-- Wire glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.6"/>

  <!-- Inner ring -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>

  <!-- Node dots on inner ring (6 nodes = 6 agents/frameworks) -->
  <circle cx="200" cy="40"  r="5" fill="#22d3ee" filter="url(#softglow)"/>
  <circle cx="339" cy="120" r="5" fill="#818cf8" filter="url(#softglow)"/>
  <circle cx="339" cy="280" r="5" fill="#22d3ee" filter="url(#softglow)"/>
  <circle cx="200" cy="360" r="5" fill="#818cf8" filter="url(#softglow)"/>
  <circle cx="61"  cy="280" r="5" fill="#22d3ee" filter="url(#softglow)"/>
  <circle cx="61"  cy="120" r="5" fill="#818cf8" filter="url(#softglow)"/>

  <!-- Wire lines connecting nodes (the "wire" concept) -->
  <line x1="200" y1="40"  x2="339" y2="120" stroke="#22d3ee" stroke-width="0.8" opacity="0.3"/>
  <line x1="339" y1="120" x2="339" y2="280" stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>
  <line x1="339" y1="280" x2="200" y2="360" stroke="#22d3ee" stroke-width="0.8" opacity="0.3"/>
  <line x1="200" y1="360" x2="61"  y2="280" stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>
  <line x1="61"  y1="280" x2="61"  y2="120" stroke="#22d3ee" stroke-width="0.8" opacity="0.3"/>
  <line x1="61"  y1="120" x2="200" y2="40"  stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>

  <!-- Center hub glow -->
  <circle cx="200" cy="200" r="90" fill="#0a0f1e" stroke="#1e3a5f" stroke-width="1"/>
  <circle cx="200" cy="200" r="85" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>

  <!-- The W lettermark — bold, geometric, center stage -->
  <!-- Using path for precise control: two V shapes forming W -->
  <path d="
    M 135 150
    L 155 250
    L 200 195
    L 245 250
    L 265 150
    L 248 150
    L 232 228
    L 200 175
    L 168 228
    L 152 150
    Z
  " fill="url(#wGrad)" filter="url(#glow)"/>

  <!-- Subtle center dot -->
  <circle cx="200" cy="200" r="3" fill="#22d3ee" opacity="0.6" filter="url(#softglow)"/>
</svg>
