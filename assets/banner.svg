<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <!-- Deep space background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020818"/>
      <stop offset="50%" style="stop-color:#050d2a"/>
      <stop offset="100%" style="stop-color:#0a0520"/>
    </linearGradient>
    <!-- WIRE title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="35%" style="stop-color:#818cf8"/>
      <stop offset="65%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <!-- Wire line gradient -->
    <linearGradient id="wireGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#020818;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#22d3ee;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1"/>
      <stop offset="85%" style="stop-color:#c084fc;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#020818;stop-opacity:0"/>
    </linearGradient>
    <!-- Node glow filters -->
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Star pattern -->
    <pattern id="stars" x="0" y="0" width="120" height="80" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="15" r="0.8" fill="#ffffff" opacity="0.4"/>
      <circle cx="45" cy="5" r="0.6" fill="#ffffff" opacity="0.3"/>
      <circle cx="80" cy="30" r="1" fill="#ffffff" opacity="0.5"/>
      <circle cx="110" cy="12" r="0.7" fill="#ffffff" opacity="0.35"/>
      <circle cx="25" cy="55" r="0.9" fill="#ffffff" opacity="0.3"/>
      <circle cx="65" cy="65" r="0.6" fill="#ffffff" opacity="0.4"/>
      <circle cx="95" cy="70" r="0.8" fill="#ffffff" opacity="0.25"/>
      <circle cx="5" cy="72" r="0.5" fill="#22d3ee" opacity="0.6"/>
      <circle cx="115" cy="50" r="0.7" fill="#c084fc" opacity="0.5"/>
      <circle cx="55" cy="40" r="0.5" fill="#818cf8" opacity="0.4"/>
    </pattern>
    <!-- Subtle grid -->
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <!-- Radial center glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4338ca;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#020818;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="340" fill="url(#bgGrad)" rx="16"/>
  <rect width="1200" height="340" fill="url(#stars)" rx="16"/>
  <rect width="1200" height="340" fill="url(#grid)" rx="16"/>
  <rect width="1200" height="340" fill="url(#centerGlow)" rx="16"/>

  <!-- Subtle arc decorations top-left and bottom-right -->
  <circle cx="-40" cy="-40" r="220" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.08"/>
  <circle cx="-40" cy="-40" r="280" fill="none" stroke="#818cf8" stroke-width="0.5" opacity="0.05"/>
  <circle cx="1240" cy="380" r="220" fill="none" stroke="#c084fc" stroke-width="0.5" opacity="0.08"/>
  <circle cx="1240" cy="380" r="280" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.05"/>

  <!-- Constellation dots scattered -->
  <circle cx="80" cy="60" r="2" fill="#22d3ee" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="180" cy="120" r="1.5" fill="#818cf8" opacity="0.5"/>
  <circle cx="140" cy="260" r="2" fill="#c084fc" opacity="0.5" filter="url(#softGlow)"/>
  <circle cx="1050" cy="80" r="2" fill="#22d3ee" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="1120" cy="200" r="1.5" fill="#818cf8" opacity="0.4"/>
  <circle cx="1000" cy="270" r="2" fill="#c084fc" opacity="0.5" filter="url(#softGlow)"/>
  <circle cx="300" cy="40" r="1.5" fill="#22d3ee" opacity="0.4"/>
  <circle cx="900" cy="300" r="1.5" fill="#c084fc" opacity="0.4"/>

  <!-- Constellation lines -->
  <line x1="80" y1="60" x2="180" y2="120" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>
  <line x1="180" y1="120" x2="140" y2="260" stroke="#818cf8" stroke-width="0.5" opacity="0.15"/>
  <line x1="1050" y1="80" x2="1120" y2="200" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>
  <line x1="1120" y1="200" x2="1000" y2="270" stroke="#c084fc" stroke-width="0.5" opacity="0.15"/>

  <!-- ═══ Main wire line ═══ -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="url(#wireGrad)" stroke-width="1.5" opacity="0.7"/>

  <!-- Agent nodes on the wire -->
  <!-- Node 1: LangGraph -->
  <circle cx="200" cy="210" r="22" fill="#0a0520" stroke="#22d3ee" stroke-width="1.5" opacity="0.9" filter="url(#glowCyan)"/>
  <circle cx="200" cy="210" r="4" fill="#22d3ee" filter="url(#glowCyan)"/>
  <text x="200" y="248" font-family="'SF Mono',monospace" font-size="9" fill="#22d3ee" text-anchor="middle" opacity="0.8">LangGraph</text>

  <!-- Node 2: CrewAI -->
  <circle cx="390" cy="210" r="18" fill="#0a0520" stroke="#818cf8" stroke-width="1.5" opacity="0.9" filter="url(#glowPurple)"/>
  <circle cx="390" cy="210" r="3.5" fill="#818cf8" filter="url(#glowPurple)"/>
  <text x="390" y="243" font-family="'SF Mono',monospace" font-size="9" fill="#818cf8" text-anchor="middle" opacity="0.8">CrewAI</text>

  <!-- Node 3: HIRE (center, larger) -->
  <circle cx="600" cy="210" r="30" fill="#0a0520" stroke="url(#titleGrad)" stroke-width="2" filter="url(#glowPurple)"/>
  <circle cx="600" cy="210" r="8" fill="url(#titleGrad)" filter="url(#glowPurple)"/>
  <text x="600" y="256" font-family="'SF Mono',monospace" font-size="9" fill="#c084fc" text-anchor="middle" opacity="0.9">HIRE</text>

  <!-- Node 4: AutoGen -->
  <circle cx="810" cy="210" r="18" fill="#0a0520" stroke="#818cf8" stroke-width="1.5" opacity="0.9" filter="url(#glowPurple)"/>
  <circle cx="810" cy="210" r="3.5" fill="#818cf8" filter="url(#glowPurple)"/>
  <text x="810" y="243" font-family="'SF Mono',monospace" font-size="9" fill="#818cf8" text-anchor="middle" opacity="0.8">AutoGen</text>

  <!-- Node 5: Foundry -->
  <circle cx="1000" cy="210" r="22" fill="#0a0520" stroke="#22d3ee" stroke-width="1.5" opacity="0.9" filter="url(#glowCyan)"/>
  <circle cx="1000" cy="210" r="4" fill="#22d3ee" filter="url(#glowCyan)"/>
  <text x="1000" y="248" font-family="'SF Mono',monospace" font-size="9" fill="#22d3ee" text-anchor="middle" opacity="0.8">Foundry</text>

  <!-- ═══ WIRE title ═══ -->
  <text x="600" y="118"
    font-family="'SF Mono','Fira Code','Courier New',monospace"
    font-size="96"
    font-weight="900"
    fill="url(#titleGrad)"
    text-anchor="middle"
    filter="url(#textGlow)"
    letter-spacing="20">WIRE</text>

  <!-- Subtitle -->
  <text x="600" y="152"
    font-family="'SF Mono','Fira Code',monospace"
    font-size="12.5"
    fill="#94a3b8"
    text-anchor="middle"
    letter-spacing="4">WORKFORCE  INTELLIGENCE  &amp;  REASONING  ENGINE</text>

  <!-- Tagline -->
  <text x="600" y="176"
    font-family="'SF Mono','Fira Code',monospace"
    font-size="11"
    fill="#4b5563"
    text-anchor="middle"
    font-style="italic"
    letter-spacing="1">"Describe the work. WIRE hires the workforce."</text>

  <!-- Bottom labels -->
  <text x="600" y="302"
    font-family="'SF Mono',monospace"
    font-size="10"
    fill="#374151"
    text-anchor="middle"
    letter-spacing="3">5 FRAMEWORKS  ·  409 TESTS  ·  SOC-2 / HIPAA / GDPR  ·  MIT LICENSE</text>
</svg>
