<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <defs>
    <radialGradient id="logobg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0f1729"/>
      <stop offset="100%" style="stop-color:#070d1a"/>
    </radialGradient>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="textg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <filter id="lg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ringG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.7"/>
    </linearGradient>
  </defs>

  <!-- Logo mark — circle with W -->
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#logobg)"/>
  <circle cx="60" cy="60" r="53" fill="none" stroke="url(#ringG)" stroke-width="1.2" opacity="0.7"/>

  <!-- Hex nodes on ring -->
  <circle cx="60" cy="9"  r="3.5" fill="#22d3ee" filter="url(#sg)"/>
  <circle cx="108" cy="38" r="3.5" fill="#818cf8" filter="url(#sg)"/>
  <circle cx="108" cy="83" r="3.5" fill="#22d3ee" filter="url(#sg)"/>
  <circle cx="60" cy="111" r="3.5" fill="#818cf8" filter="url(#sg)"/>
  <circle cx="12" cy="83" r="3.5" fill="#22d3ee" filter="url(#sg)"/>
  <circle cx="12" cy="38" r="3.5" fill="#818cf8" filter="url(#sg)"/>

  <!-- Wire lines -->
  <line x1="60" y1="9"   x2="108" y2="38"  stroke="#22d3ee" stroke-width="0.7" opacity="0.25"/>
  <line x1="108" y1="38" x2="108" y2="83"  stroke="#818cf8" stroke-width="0.7" opacity="0.25"/>
  <line x1="108" y1="83" x2="60" y2="111"  stroke="#22d3ee" stroke-width="0.7" opacity="0.25"/>
  <line x1="60" y1="111" x2="12" y2="83"   stroke="#818cf8" stroke-width="0.7" opacity="0.25"/>
  <line x1="12" y1="83"  x2="12" y2="38"   stroke="#22d3ee" stroke-width="0.7" opacity="0.25"/>
  <line x1="12" y1="38"  x2="60" y2="9"    stroke="#818cf8" stroke-width="0.7" opacity="0.25"/>

  <!-- W lettermark -->
  <path d="M 33 38 L 43 75 L 60 55 L 77 75 L 87 38 L 80 38 L 70 67 L 60 47 L 50 67 L 40 38 Z"
        fill="url(#wg)" filter="url(#lg)"/>

  <!-- WIRE wordmark -->
  <text x="135" y="68"
    font-family="'SF Mono','Fira Code','Courier New',monospace"
    font-size="52"
    font-weight="900"
    letter-spacing="6"
    fill="url(#textg)">WIRE</text>

  <!-- Tagline -->
  <text x="137" y="90"
    font-family="'SF Mono','Fira Code',monospace"
    font-size="11"
    fill="#475569"
    letter-spacing="2">WORKFORCE INTELLIGENCE &amp; REASONING ENGINE</text>
</svg>
